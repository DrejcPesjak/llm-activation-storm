<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activation Storm</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-main">
          <p class="eyebrow">Gemma 3 4B IT</p>
          <h1>Activation Storm</h1>
          <p class="lede">Layer-by-layer prompt flow through attention, residual paths, and MLPs.</p>
        </div>
        <div class="hero-meta">
          <span id="status-pill" class="pill idle">Idle</span>
          <span id="model-meta" class="meta-copy">Loading model metadata…</span>
        </div>
      </section>

      <section class="workspace-bar">
        <div class="controls">
          <label class="field compact-field">
            <span>Model</span>
            <select id="model-select"></select>
          </label>
          <label class="field prompt-field">
            <span>Prompt</span>
            <textarea id="prompt-input" rows="4">Who is the best basketball player of all time?</textarea>
          </label>
          <div class="actions">
            <button id="analyze-button" type="button">Analyze Flow</button>
            <button id="play-button" class="button-secondary" type="button" disabled>Play</button>
          </div>
        </div>

        <div class="filters">
          <div class="field">
            <span>Show Stages</span>
            <div class="toggle-group segmented-control">
              <label class="toggle-pill"><input id="toggle-attn" type="checkbox" checked /> <span>Attn</span></label>
              <label class="toggle-pill"><input id="toggle-resid" type="checkbox" checked /> <span>Resid</span></label>
              <label class="toggle-pill"><input id="toggle-mlp" type="checkbox" checked /> <span>MLP</span></label>
            </div>
          </div>
          <div class="field">
            <span>Token Axis</span>
            <label class="toggle-pill single-toggle"><input id="toggle-special" type="checkbox" /> <span>Include special tokens</span></label>
          </div>
        </div>
      </section>

      <section class="visualization-card">
        <div class="timeline">
          <div class="timeline-header">
            <span id="step-label">Step: —</span>
            <span id="step-counter">0 / 0</span>
          </div>
          <input id="step-slider" type="range" min="0" max="0" value="0" disabled />
          <div id="token-strip" class="token-strip"></div>
          <p id="analysis-note" class="analysis-note"></p>
        </div>
        <canvas id="storm-canvas"></canvas>
        <div class="legend">
          <span><i class="legend-dot positive"></i> Cyan means positive activation.</span>
          <span><i class="legend-dot negative"></i> Pink means negative activation.</span>
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
