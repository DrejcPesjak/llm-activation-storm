<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activation Storm</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Gemma Activation Observatory</p>
          <h1>Activation Storm</h1>
          <p class="lede">
            Follow prompt information as it moves through attention, residual merges, and MLPs across the full network.
          </p>
        </div>
        <div class="hero-meta">
          <span id="status-pill" class="pill idle">Idle</span>
          <span id="model-meta" class="meta-copy">Loading model metadata…</span>
        </div>
      </section>

      <section class="controls">
        <label class="field compact-field">
          <span>Model</span>
          <select id="model-select"></select>
        </label>
        <label class="field prompt-field">
          <span>Prompt</span>
          <textarea id="prompt-input" rows="5">Write a cinematic description of a thunderstorm seen from orbit.</textarea>
        </label>
        <div class="actions">
          <button id="analyze-button" type="button">Analyze Flow</button>
          <button id="play-button" type="button" disabled>Play</button>
        </div>
      </section>

      <section class="timeline">
        <div class="timeline-header">
          <span id="step-label">Step: —</span>
          <span id="step-counter">0 / 0</span>
        </div>
        <input id="step-slider" type="range" min="0" max="0" value="0" disabled />
        <div id="token-strip" class="token-strip"></div>
        <p id="analysis-note" class="analysis-note"></p>
      </section>

      <section class="visualization-card">
        <canvas id="storm-canvas"></canvas>
        <div class="legend">
          <span><i class="legend-dot positive"></i> Positive activation</span>
          <span><i class="legend-dot negative"></i> Negative activation</span>
          <span><i class="legend-dot active"></i> Active stage</span>
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
